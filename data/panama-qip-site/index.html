function priorityClass(p){
  if(/money/i.test(p)) return "prio prio-money";
  if(/P1/.test(p)) return "prio prio-1";
  if(/P2/.test(p)) return "prio prio-2";
  return "prio prio-3";

function StatCard({ num, unit, label, sub, primary }){
  return (
    <div className={"stat-card" + (primary ? " primary" : "")}>

function Bar({ label, value, max, gold }){

  return (
    <div className="bar-row">

      <span className="bar-track"><span className={"bar-fill" + (gold ? " gold" : "")} style={{ width: pct + "%" }} /></span>
      <span className="bar-val">{value}</span>
    </div>
  );
}

/* ---------- THE INTERACTIVE KEYWORD TABLE ---------- */

const COLS = [
  { key:"keyword",   label:"Keyword",     sortable:true,  num:false },
  { key:"lang",      label:"Lang",        sortable:true,  num:false },
  { key:"cluster",   label:"Cluster",     sortable:false, num:false },
  { key:"vol_oman",  label:"Oman /mo",    sortable:true,  num:true  },
  { key:"vol_jordan",label:"Jordan /mo",  sortable:true,  num:true  },
  { key:"competition",label:"Competition",sortable:true,  num:false },
  { key:"cpc",       label:"Est. CPC",    sortable:false, num:false },
  { key:"priority",  label:"Priority",    sortable:true,  num:false }
];

const COMP_ORDER = { "Low":1, "Medium":2, "High":3, "—":0 };
const PRIO_ORDER = (p) => {
  if(/money/i.test(p)) return 0;
  if(/P1/.test(p)) return 1;
  if(/P2/.test(p)) return 2;
  return 3;
};

function KeywordTable(){
  const [search, setSearch] = useState("");
  const [cluster, setCluster] = useState("all");
  const [lang, setLang] = useState("all");
  const [sortKey, setSortKey] = useState("vol_max");
  const [sortDir, setSortDir] = useState("desc");

  function toggleSort(key){
    if(key === sortKey){
      setSortDir(sortDir === "asc" ? "desc" : "asc");
    } else {
      setSortKey(key);
      setSortDir(key === "keyword" || key === "lang" ? "asc" : "desc");
    }
  }

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    let rows = KW_ROWS.filter((r) => {
      if(cluster !== "all" && r.cluster !== cluster) return false;
      if(lang !== "all" && r.lang !== lang) return false;
      if(q){
        const hay = (r.keyword + " " + (r.translit||"") + " " + (r.gloss||"") + " " + r.cluster_name).toLowerCase();
        if(hay.indexOf(q) === -1) return false;
      }
      return true;
    });

    const dir = sortDir === "asc" ? 1 : -1;
    rows = rows.slice().sort((a, b) => {
      let av, bv;
      if(sortKey === "keyword"){
        av = (a.lang === "AR" ? (a.translit||a.keyword) : a.keyword).toLowerCase();
        bv = (b.lang === "AR" ? (b.translit||b.keyword) : b.keyword).toLowerCase();
        return av < bv ? -1*dir : av > bv ? 1*dir : 0;
      }
      if(sortKey === "lang"){
        if(a.lang === b.lang) return b.vol_max - a.vol_max;
        return a.lang < b.lang ? -1*dir : 1*dir;
      }
      if(sortKey === "competition"){
        av = COMP_ORDER[a.competition] ?? 0; bv = COMP_ORDER[b.competition] ?? 0;
      } else if(sortKey === "priority"){
        av = PRIO_ORDER(a.priority); bv = PRIO_ORDER(b.priority);
        // priority sorts money→P1→P2→P3 as "highest first" on desc
        return (av - bv) * (sortDir === "desc" ? 1 : -1);
      } else if(sortKey === "vol_oman"){
        av = a.vol_oman; bv = b.vol_oman;
      } else if(sortKey === "vol_jordan"){
        av = a.vol_jordan; bv = b.vol_jordan;
      } else {
        av = a.vol_max; bv = b.vol_max;
      }
      if(av === bv) return b.vol_max - a.vol_max; // stable tie-break by overall volume
      return (av - bv) * dir;
    });
    return rows;
  }, [search, cluster, lang, sortKey, sortDir]);

  function resetAll(){
    setSearch(""); setCluster("all"); setLang("all"); setSortKey("vol_max"); setSortDir("desc");
  }

  const arrow = (key) => {
    if(key !== sortKey) return null;
    return <span className="arrow">{sortDir === "asc" ? "▲" : "▼"}</span>;
  };

  return (
    <section className="band" id="keywords">
      <div className="wrap">
        <p className="eyebrow">★ The centerpiece</p>
        <h2 className="section-title">Every keyword, explorable</h2>
        <p className="section-lede">
          All <b>121 researched keywords</b> — 73 English + 48 Arabic — across six intent clusters. Search, filter
          by cluster or language, and sort any column. Arabic terms show script (right-to-left) with transliteration
          and English gloss beneath. A value of <b>&lt;10</b> means Keyword Planner reported no measurable volume
          for that market (its reporting floor) — real intent, negligible traffic.
        </p>

        <div className="kw-toolbar">
          <div className="field search">
            <label htmlFor="kw-search">Search keywords</label>
            <input id="kw-search" type="text" placeholder="e.g. golden visa, panama, iqāma, citizenship…"
              value={search} onChange={(e) => setSearch(e.target.value)} />
          </div>
          <div className="field">
            <label htmlFor="kw-cluster">Cluster</label>
            <select id="kw-cluster" value={cluster} onChange={(e) => setCluster(e.target.value)}>
              <option value="all">All clusters (A–F)</option>
              {Object.keys(CLUSTER_NAMES).map((c) => (
                <option key={c} value={c}>{c} · {CLUSTER_NAMES[c]}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Language</label>
            <div className="seg" role="group" aria-label="Language filter">
              {[["all","All"],["EN","EN"],["AR","AR"]].map(([v,l]) => (
                <button key={v} className={lang === v ? "on" : ""} onClick={() => setLang(v)}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        <div className="count-line">
          <div className="cnt">
            Showing <b>{filtered.length}</b> of {KW_ROWS.length} keywords
            {(search || cluster !== "all" || lang !== "all") &&
              <span> &nbsp;·&nbsp; <button className="btn-reset" onClick={resetAll}>reset filters</button></span>}
          </div>
          <div className="legend">
            <span><i className="sw" style={{background:'var(--gold-soft)', border:'1px solid var(--amber-line)'}} /> CPC-bearing term</span>
            <span><span className="money-star">★</span> Panama money term</span>
            <span><i className="sw muted" style={{background:'var(--line)'}} /> &lt;10 volume</span>
          </div>
        </div>

        <div className="kw-table-wrap">
          <table className="kw">
            <thead>
              <tr>
                {COLS.map((c) => (
                  <th key={c.key}
                      className={(c.sortable ? "sortable " : "") + (c.num ? "num" : "")}
                      onClick={c.sortable ? () => toggleSort(c.key) : undefined}>
                    {c.label}{arrow(c.key)}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={COLS.length}><div className="no-results">No keywords match those filters. <button className="btn-reset" onClick={resetAll}>Reset</button></div></td></tr>
              )}
              {filtered.map((r, i) => {
                const money = isMoney(r);
                const cpcTerm = hasCpc(r);
                return (
                  <tr key={r.cluster + "-" + r.keyword + "-" + r.lang + "-" + i}>
                    <td>
                      {r.lang === "AR" ? (
                        <div className="kw-ar-block">
                          <div className="kw-ar" dir="rtl">
                            {money && <span className="money-star">★</span>}{r.keyword}
                          </div>
                          {r.translit && <div className="kw-translit">{r.translit}</div>}
                          {r.gloss && <div className="kw-gloss">{r.gloss}</div>}
                        </div>
                      ) : (
                        <span className="kw-en">{money && <span className="money-star">★</span>}{r.keyword}</span>
                      )}
                    </td>
                    <td><span className={"lang-tag lang-" + r.lang}>{r.lang}</span></td>
                    <td>
                      <div className="cl-cell">
                        <span className={"cluster-chip " + clusterClass(r.cluster)}>{r.cluster}</span>
                      </div>
                    </td>
                    <td className={"num" + (isSub10(r.vol_oman_disp) ? " muted" : "")}>{isSub10(r.vol_oman_disp) ? "<10" : r.vol_oman_disp}</td>
                    <td className={"num" + (isSub10(r.vol_jordan_disp) ? " muted" : "")}>{isSub10(r.vol_jordan_disp) ? "<10" : r.vol_jordan_disp}</td>
                    <td>
                      {r.competition === "—"
                        ? <span className="comp-none">—</span>
                        : <span className={"comp-dot comp-" + r.competition}>{r.competition}</span>}
                    </td>
                    <td>
                      {cpcTerm
                        ? <span className="cpc-hi">{r.cpc}</span>
                        : <span className="muted" style={{fontStyle:'normal'}}>no data</span>}
                    </td>
                    <td><span className={priorityClass(r.priority)}>{money && <span className="money-star">★</span>}{r.priority}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div className="keytakeaway" style={{marginTop:20}}>
          <span className="ic">◆</span>
          <div>
            <b>The CPC reality.</b> Only <b>4 keywords</b> returned bid data — the volume-bearing head terms
            (<i>golden visa, citizenship by investment, passport by investment, residence by investment</i>).
            Everything else has too little volume for Keyword Planner to report a bid. <i>golden visa</i> in Oman
            peaks at <b>$11.90</b> high-top-of-page; Jordan CPCs run materially cheaper ($0.32–$2.11), one reason
            Arabic / Jordan-leaning traffic tends to be the cheaper click.
          </div>
        </div>
      </div>
    </section>
  );
}
